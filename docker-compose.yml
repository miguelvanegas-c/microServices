version: '3.8'

services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    container_name: monolito-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monolito-app
    env_file:
      - ./.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:${DB_PORT}/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      # Auth0 configuration (toggle with AUTH0_ENABLED)
      # Defaults provided below use the tenant URL you supplied; .env can override them.
      AUTH0_ENABLED: ${AUTH0_ENABLED:-true}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI:-https://dev-8fakcfsg1icz4j0u.us.auth0.com/}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://dev-8fakcfsg1icz4j0u.us.auth0.com/api/v2/}
      AUTH0_JWKS_URI: ${AUTH0_JWKS_URI:-https://dev-8fakcfsg1icz4j0u.us.auth0.com/.well-known/jwks.json}
    ports:
      - "${APP_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

