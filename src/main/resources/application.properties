spring.application.name=Monolito

# Datasource: allow overriding via environment variables (used by docker-compose .env)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/monolito}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Server port can be overridden by APP_PORT env var (docker-compose maps APP_PORT to container 8080)
server.port=${APP_PORT:8080}

# Ajusta las credenciales y URL segun tu entorno local o variables de entorno

# JWT
spring.jwt.secret=${JWT_SECRET:changeit}
spring.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Auth0 / Resource Server
# Either set JWKS URI or issuer-uri. Example JWKS URI: https://YOUR_DOMAIN/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH0_JWKS_URI:}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:}
# Audience expected in the token
app.security.auth0.audience=${AUTH0_AUDIENCE:}

